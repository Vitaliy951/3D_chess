name: Build and Release Spheres of Power

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ursina pyinstaller

    - name: Run logical core QA tests
      run: |
        python -m unittest spheres_of_power.py

    - name: Compile game via PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name "SpheresOfPower" --add-data "assets;assets" spheres_of_power.py

    - name: Upload Artifact (.EXE)
      uses: actions/upload-artifact@v4
      with:
        name: SpheresOfPower-Windows-Build
        path: dist/SpheresOfPower.exe
        retention-days: 7

    - name: Create GitHub Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpheresOfPower.exe
        name: Release ${{ github.ref_name }}
        body: |
          🌌 **Автоматический релиз трёхмерных шахмат «Сферы Власти»!**
          
          **Что нового в этой версии:**
          * Стабильная сборка игрового клиента под Windows.
          * Интегрирован сетевой мультиплеер и система блиц-таймеров.
          * Добавлена кастомизация цвета фракций и внутриигровой текстовый чат.
          
          *Сборка сгенерирована автоматически с помощью GitHub Actions.*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
