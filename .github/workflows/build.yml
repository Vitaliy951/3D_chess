name: Build and Release Spheres of Power

# Рабочий процесс запускается при пушах в main/master, а также при создании тегов версий (например, v1.0.0)
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    # Шаг 1: Скачиваем исходный код репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Разворачиваем Python нужной версии
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Включает встроенное кэширование пакетов pip

    # Шаг 3: Обновляем pip и устанавливаем все зависимости из requirements.txt, включая PyInstaller
    - name: Install dependencies from requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # Шаг 4: Автоматическое тестирование ядра (QA) перед компиляцией
    - name: Run logical core QA tests
      run: |
        python -m unittest spheres_of_power.py

    # Шаг 5: Сборка игры в один монолитный файл .exe через PyInstaller
    - name: Compile game via PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name "SpheresOfPower" --add-data "assets;assets" spheres_of_power.py

    # Шаг 6: Загрузка сборки в артефакты текущего запуска (для тестирования веток)
    - name: Upload Artifact (.EXE)
      uses: actions/upload-artifact@v4
      with:
        name: SpheresOfPower-Windows-Build
        path: dist/SpheresOfPower.exe
        retention-days: 7

    # Шаг 7: Автоматическая публикация на GitHub Releases (срабатывает ТОЛЬКО при пуше тега)
    - name: Create GitHub Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpheresOfPower.exe
        name: Release ${{ github.ref_name }}
        body: |
          🌌 **Автоматический релиз трехмерных шахмат «Сферы Власти»!**
          
          **Что нового в этой версии:**
          * Стабильная сборка игрового клиента под Windows.
          * Интегрирован сетевой мультиплеер и система блиц-таймеров.
          * Добавлена кастомизация цвета фракций и внутриигровой текстовый чат.
          
          *Сборка сгенерирована автоматически с помощью GitHub Actions.*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
